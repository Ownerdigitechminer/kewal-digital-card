<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Digital Business Card</title>
<meta name="description" content="Digital business card — tap to call, message, or save contact.">
<meta name="theme-color" content="#EA001B">
<style>
  :root{
    --red:#EA001B;
    --orange:#F69D1B;
    --dark:#1B1815;
    --cream:#FFF8F1;
    --gradient: linear-gradient(135deg, var(--red), var(--orange));
    --radius: 18px;
    --shadow: 0 10px 30px rgba(27,24,21,0.10);
  }

  *{ box-sizing: border-box; }

  html, body{
    height: 100%;
    overflow: hidden;
  }

  body{
    margin:0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--cream);
    color: var(--dark);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }

  .page{
    position: relative;
    max-width: 480px;
    margin: 0 auto;
    height: 100vh;
    height: 100dvh;
    background: #fff;
    box-shadow: var(--shadow);
    overflow: hidden;
    padding-bottom: 78px;
  }

  .watermark-row{
    display:flex;
    justify-content:center;
    padding: 6px 24px 1px;
  }

  .watermark-row img{
    width: 100px;
    max-width: 42%;
    opacity: 0.18;
    pointer-events: none;
    user-select: none;
  }

  /* Header / cover */
  .cover{
    background: var(--gradient);
    height: 110px;
    position: relative;
  }

  .avatar-wrap{
    position: absolute;
    left: 50%;
    bottom: -40px;
    transform: translateX(-50%);
  }

  .avatar{
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 3px solid #fff;
    background: var(--dark);
    overflow: hidden;
    box-shadow: var(--shadow);
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .avatar img{
    width:100%;
    height:100%;
    object-fit: cover;
    display:block;
  }

  .avatar-fallback{
    color:#fff;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  /* Identity */
  .identity{
    text-align:center;
    padding: 46px 24px 4px;
  }

  .name{
    font-size: 19px;
    font-weight: 800;
    margin: 0 0 2px;
    color: var(--dark);
  }

  .title{
    font-size: 12.5px;
    font-weight: 600;
    margin: 0;
    color: var(--red);
  }

  /* Save contact CTA */
  .save-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    margin: 12px 24px 0;
    padding: 10px 16px;
    border-radius: var(--radius);
    background: var(--gradient);
    color:#fff;
    font-weight: 700;
    font-size: 13.5px;
    border: none;
    width: calc(100% - 48px);
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(234,0,27,0.25);
  }

  .save-btn:active{ transform: scale(0.98); }

  /* Section */
  .section{
    padding: 8px 24px 0;
  }

  .section h2{
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #9a9490;
    margin: 0 0 3px;
  }

  .section p{
    font-size: 12px;
    line-height: 1.35;
    color: var(--dark);
    margin: 0;
    display: -webkit-box;
    -webkit-line-clamp: 6;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* Bottom navigation bar (engagement CTAs) */
  .bottom-nav{
    position: fixed;
    left: 50%;
    bottom: 0;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    display:flex;
    background: #fff;
    border-top: 1px solid #f0e9e2;
    box-shadow: 0 -8px 24px rgba(27,24,21,0.10);
    padding: 6px 6px calc(6px + env(safe-area-inset-bottom));
    z-index: 20;
  }

  .nav-item{
    flex: 1;
    display:flex;
    flex-direction: column;
    align-items:center;
    gap: 3px;
    text-decoration:none;
    color: var(--dark);
    font-size: 10px;
    font-weight: 700;
    padding: 3px 2px;
  }

  .nav-item .icon{
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--gradient);
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .nav-item .icon svg{ width:15px; height:15px; fill:#fff; }

  .nav-item:active{ opacity: 0.7; }

  /* Socials */
  .socials{
    display:flex;
    justify-content:center;
    gap: 12px;
    padding: 10px 24px 0;
  }

  .socials:empty{ display:none; }

  .social{
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: var(--dark);
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
  }

  .social svg{ width:16px; height:16px; fill: var(--cream); }

</style>
</head>
<body>

<div class="page">

  <div class="cover">
    <div class="avatar-wrap">
      <div class="avatar">
        <img id="photoImg" src="profile.jpg" alt="Profile photo"
             onerror="this.style.display='none'; document.getElementById('avatarFallback').style.display='flex';">
        <div id="avatarFallback" class="avatar-fallback" style="display:none;"></div>
      </div>
    </div>
  </div>

  <div class="identity">
    <h1 class="name" id="nameText">Your Name</h1>
    <p class="title" id="titleText">Your Job Title</p>
  </div>

  <button class="save-btn" id="saveContactBtn">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="#fff"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
    Save Contact
  </button>

  <div class="section">
    <h2>About Me</h2>
    <p id="aboutMeText">Write a short, friendly intro about yourself here — your background, what you do, and what makes you stand out.</p>
  </div>

  <div class="watermark-row">
    <img src="logo-watermark.svg" alt="KeRaeva logo">
  </div>

  <div class="section">
    <h2>About Company</h2>
    <p id="aboutCompanyText">A one or two line description of your company — what it does and the value it delivers to customers.</p>
  </div>

  <div class="socials" id="socialsRow">
    <!-- populated by JS from CONFIG -->
  </div>

</div>

<nav class="bottom-nav" id="bottomNav">
  <!-- populated by JS from CONFIG -->
</nav>

<script>
/* ============================================================
   EDIT EVERYTHING BELOW — this is the only place you need to touch.
   Leave a field empty ("") to hide that button/section automatically.
   ============================================================ */
const CONFIG = {
  firstName: "Kewal",
  lastName: "Mangukia",
  title: "Founder & CEO, KeRaeva",
  company: "KeRaeva by Medfaster Healthtech",
  aboutMe: "Founder & CEO of KeRaeva, building an AI-powered healthcare staffing platform that connects top talent with leading Canadian healthcare institutions. Brings 10+ years of experience in public health and has led major healthcare initiatives, including projects exceeding $290 millions with Alberta Health Services.",
  aboutCompany: "KeRaeva is an AI-powered healthcare staffing platform connecting top-tier talent with leading Canadian healthcare institutions, built by Medfaster Healthtech Private Limited (India) and Medfaster Heath Tech Inc. (Canada).",

  phone: "+14039196824",
  email: "ceo@keraeva.com",
  whatsapp: "14039196824",
  website: "https://keraeva.com/",

  social: {
    linkedin: "",
    instagram: "",
    x: "",
    facebook: ""
  },

  photo: "profile.jpg" // drop a square photo named profile.jpg next to this file
};
/* ============================================================ */

const fullName = `${CONFIG.firstName} ${CONFIG.lastName}`.trim();
document.getElementById('nameText').textContent = fullName || "Your Name";
document.getElementById('titleText').textContent = CONFIG.title;
document.getElementById('aboutMeText').textContent = CONFIG.aboutMe;
document.getElementById('aboutCompanyText').textContent = CONFIG.aboutCompany;
document.title = fullName ? `${fullName} — Digital Card` : "Digital Business Card";

document.getElementById('avatarFallback').textContent =
  (CONFIG.firstName[0] || "") + (CONFIG.lastName[0] || "");
document.getElementById('photoImg').src = CONFIG.photo;

const icons = {
  phone: { viewBox: '0 0 24 24', path: '<path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>' },
  email: { viewBox: '0 0 24 24', path: '<path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5z"/>' },
  whatsapp: { viewBox: '0 0 448 512', path: '<path d="M380.9 97.1C339 55.1 283.2 32 224.1 32c-122.9 0-223 100.1-223 223 0 39.4 10.3 78 29.9 111.9L1 480l125.2-32.8c32.6 17.8 69.4 27.2 106.9 27.2h.1c122.9 0 223-100.1 223-223 0-59.1-23.1-114.7-65.2-156.5zM224.1 438.4h-.1c-33.2 0-65.7-8.9-94-25.7l-6.7-4-69.8 18.3 18.6-67.9-4.4-7c-18.5-29.4-28.3-63.3-28.3-98.2 0-101.7 82.8-184.4 184.6-184.4 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 54 81.2 54 130.5 0 101.8-82.8 184.4-184.4 184.4zm101.4-138.2c-5.5-2.8-32.7-16.1-37.8-18-5.1-1.9-8.8-2.8-12.5 2.8s-14.4 18-17.6 21.7c-3.2 3.7-6.5 4.1-12 1.4-32.6-16.3-54-29-75.5-65.8-5.7-9.8 5.7-9.1 16.3-30.3 1.8-3.7.9-6.8-.6-9.6-1.5-2.8-13.4-32.3-18.4-44.2-4.9-11.6-9.9-10-13.6-10.2-3.5-.2-7.5-.2-11.5-.2-4 0-10.5 1.5-16 7.4-5.5 5.9-21 20.6-21 50.2 0 29.6 21.5 58.2 24.5 62.2 3 4 41.9 64 101.5 87.2 50.6 19.7 60.9 15.8 71.9 14.8 11-1 32.7-13.4 37.3-26.4 4.6-13 4.6-24.1 3.2-26.4-1.4-2.3-5-3.7-10.5-6.5z"/>' },
  website: { viewBox: '0 0 24 24', path: '<path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm6.93 6h-2.95a15.65 15.65 0 0 0-1.38-3.56A8.03 8.03 0 0 1 18.93 8zM12 4.04c.83 1.2 1.48 2.53 1.91 3.96h-3.82c.43-1.43 1.08-2.76 1.91-3.96zM4.26 14a8.1 8.1 0 0 1 0-4h3.38a16.3 16.3 0 0 0 0 4H4.26zm.81 2h2.95c.32 1.25.78 2.45 1.38 3.56A8.03 8.03 0 0 1 5.07 16zm2.95-8H5.07a8.03 8.03 0 0 1 4.33-3.56A15.65 15.65 0 0 0 8.02 8zM12 19.96a15.65 15.65 0 0 1-1.91-3.96h3.82c-.43 1.43-1.08 2.76-1.91 3.96zM14.4 14H9.6a14.3 14.3 0 0 1 0-4h4.8a14.3 14.3 0 0 1 0 4zm.93 5.56c.6-1.11 1.06-2.31 1.38-3.56h2.95a8.03 8.03 0 0 1-4.33 3.56zM16.36 14a16.3 16.3 0 0 0 0-4h3.38a8.1 8.1 0 0 1 0 4h-3.38z"/>' }
};

const socialIcons = {
  linkedin: '<path d="M19 3A2 2 0 0 1 21 5V19A2 2 0 0 1 19 21H5A2 2 0 0 1 3 19V5A2 2 0 0 1 5 3H19M18.5 18.5V13.2A3.26 3.26 0 0 0 15.24 9.94C14.39 9.94 13.4 10.46 12.92 11.24V10.13H10.13V18.5H12.92V13.57C12.92 12.8 13.54 12.17 14.31 12.17A1.4 1.4 0 0 1 15.71 13.57V18.5H18.5M6.88 8.56A1.68 1.68 0 0 0 8.56 6.88C8.56 5.95 7.81 5.19 6.88 5.19A1.69 1.69 0 0 0 5.19 6.88C5.19 7.81 5.95 8.56 6.88 8.56M8.27 18.5V10.13H5.5V18.5H8.27Z"/>',
  instagram: '<path d="M7.8 2h8.4A5.8 5.8 0 0 1 22 7.8v8.4a5.8 5.8 0 0 1-5.8 5.8H7.8A5.8 5.8 0 0 1 2 16.2V7.8A5.8 5.8 0 0 1 7.8 2zm-.2 2A3.6 3.6 0 0 0 4 7.6v8.8A3.6 3.6 0 0 0 7.6 20h8.8a3.6 3.6 0 0 0 3.6-3.6V7.6A3.6 3.6 0 0 0 16.4 4H7.6zm9.65 1.5a1.25 1.25 0 1 1 0 2.5 1.25 1.25 0 0 1 0-2.5zM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>',
  x: '<path d="M18.24 3h2.86l-6.25 7.14L22 21h-5.9l-4.6-6.02L6.06 21H3.2l6.7-7.65L2 3h6.04l4.16 5.5L18.24 3zm-1.01 16.2h1.58L7.45 4.7H5.76l11.47 14.5z"/>',
  facebook: '<path d="M13.5 21v-7.5h2.5l.5-3h-3V8.25c0-.87.24-1.46 1.5-1.46h1.6V4.1C15.9 4.04 15 4 13.96 4 11.46 4 9.75 5.49 9.75 8.06V10.5H7v3h2.75V21h3.75z"/>'
};

function buildAction(href, label, iconKey){
  const a = document.createElement('a');
  a.className = 'nav-item';
  a.href = href;
  if (iconKey === 'website') a.target = '_blank';
  a.innerHTML = `<span class="icon"><svg viewBox="${icons[iconKey].viewBox}">${icons[iconKey].path}</svg></span><span>${label}</span>`;
  return a;
}

const bottomNav = document.getElementById('bottomNav');
if (CONFIG.phone) bottomNav.appendChild(buildAction(`tel:${CONFIG.phone}`, 'Call', 'phone'));
if (CONFIG.whatsapp) bottomNav.appendChild(buildAction(`https://wa.me/${CONFIG.whatsapp}`, 'WhatsApp', 'whatsapp'));
if (CONFIG.email) bottomNav.appendChild(buildAction(`mailto:${CONFIG.email}`, 'Email', 'email'));
if (CONFIG.website) bottomNav.appendChild(buildAction(CONFIG.website, 'Website', 'website'));

const socialsRow = document.getElementById('socialsRow');
Object.keys(CONFIG.social).forEach(key => {
  const url = CONFIG.social[key];
  if (!url) return;
  const a = document.createElement('a');
  a.className = 'social';
  a.href = url;
  a.target = '_blank';
  a.rel = 'noopener';
  a.innerHTML = `<svg viewBox="0 0 24 24">${socialIcons[key]}</svg>`;
  socialsRow.appendChild(a);
});

document.getElementById('saveContactBtn').addEventListener('click', () => {
  const vcard = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    `N:${CONFIG.lastName};${CONFIG.firstName};;;`,
    `FN:${fullName}`,
    CONFIG.company ? `ORG:${CONFIG.company}` : '',
    CONFIG.title ? `TITLE:${CONFIG.title}` : '',
    CONFIG.phone ? `TEL;TYPE=CELL:${CONFIG.phone}` : '',
    CONFIG.email ? `EMAIL:${CONFIG.email}` : '',
    CONFIG.website ? `URL:${CONFIG.website}` : '',
    'END:VCARD'
  ].filter(Boolean).join('\n');

  const blob = new Blob([vcard], { type: 'text/vcard' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `${fullName.replace(/\s+/g, '_') || 'contact'}.vcf`;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
});
</script>

</body>
</html>
